gas:
  density_kgm3: 1.2
  dynamic_viscosity_Pas: 1.8e-05
  temperature_K: 320.0
paths:
  materials_csv: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\materials.csv
  part_walls_csv: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\part_walls.csv
  particles_csv: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\particles.csv
  process_steps_csv: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\process_steps.csv
  source_events_csv: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\source_events.csv
process:
  step_defaults:
    output:
      save_every_override: 0
      segment_name: run
providers:
  field:
    kind: precomputed_npz
    npz_path: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\generated\comsol_field_2d.npz
  geometry:
    kind: precomputed_npz
    npz_path: C:\Users\user\Desktop\particle_simulation\examples\comsol_from_data_2d_10k\generated\comsol_geometry_2d.npz
run:
  coordinate_system: cartesian_xy
  spatial_dim: 2
  time_interpolation: linear
solver:
  dt: 0.01
  integrator: etd2
  min_tau_p_s: 1.0e-05
  plot_particle_limit: 80
  save_every: 1
  seed: 12345
  t_end: 0.8
  adaptive_substep_enabled: 0
  adaptive_substep_tau_ratio: 0.5
  adaptive_substep_max_splits: 4
source:
  default_law: explicit_csv
  direct_wall_shear:
    probe_distance_m: 0.001
  preprocess:
    enabled: true
    seed: 24680
  source_position_offset_m: 0.0
  source_speed_scale: 1.0

