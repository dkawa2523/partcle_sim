run:
  spatial_dim: 2
  coordinate_system: cartesian_xy
  time_interpolation: linear
paths:
  particles_csv: particles.csv
  materials_csv: materials.csv
  part_walls_csv: part_walls.csv
  source_events_csv: source_events.csv
  process_steps_csv: process_steps.csv
providers:
  geometry:
    kind: box
    bounds: [-1.0, 1.0, -1.0, 1.0]
    grid_shape: [81, 81]
    boundary_part_ids: [10, 20, 20, 10]
  field:
    kind: linear_shear
    shear_rate: 3.0
    dynamic_viscosity_Pas: 1.8e-5
    time_mode: steady
gas:
  temperature_K: 300.0
  dynamic_viscosity_Pas: 1.8e-5
  density_kgm3: 1.2
source:
  preprocess:
    enabled: true
    seed: 123
  default_law: explicit_csv
  direct_wall_shear:
    probe_distance_m: 0.02
process:
  step_defaults:
    output:
      segment_name: run
solver:
  dt: 0.02
  t_end: 1.0
  save_every: 2
  integrator: drag_relaxation  # drag_relaxation | etd | etd2
  adaptive_substep_enabled: 0
  adaptive_substep_tau_ratio: 0.5
  adaptive_substep_max_splits: 4
  max_hits_retry_splits: 0
  max_hits_retry_local_adaptive_enabled: 0
  seed: 1234
